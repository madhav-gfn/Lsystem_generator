services:
  - type: web
    name: lsystem-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://lsystem-generator-git-main-madhav-gfns-projects.vercel.app/
