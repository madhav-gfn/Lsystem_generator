<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#150a0a"/>
  <!-- account_tree style branching structure in crimson -->
  <!-- Root node -->
  <circle cx="16" cy="26" r="3" fill="#e61919"/>
  <!-- Left branch node -->
  <circle cx="8" cy="14" r="2.5" fill="#e61919"/>
  <!-- Right branch node -->
  <circle cx="24" cy="14" r="2.5" fill="#e61919"/>
  <!-- Top-left leaf -->
  <circle cx="5" cy="6" r="2" fill="#e61919" opacity="0.8"/>
  <!-- Top-right of left branch -->
  <circle cx="11" cy="6" r="2" fill="#e61919" opacity="0.8"/>
  <!-- Top of right branch -->
  <circle cx="24" cy="6" r="2" fill="#e61919" opacity="0.8"/>
  <!-- Trunk: root to split -->
  <line x1="16" y1="23" x2="16" y2="18" stroke="#e61919" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Split to left -->
  <line x1="16" y1="18" x2="8" y2="16.5" stroke="#e61919" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Split to right -->
  <line x1="16" y1="18" x2="24" y2="16.5" stroke="#e61919" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left branch to leaves -->
  <line x1="8" y1="11.5" x2="5" y2="8" stroke="#e61919" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="11.5" x2="11" y2="8" stroke="#e61919" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right branch to leaf -->
  <line x1="24" y1="11.5" x2="24" y2="8" stroke="#e61919" stroke-width="1.2" stroke-linecap="round"/>
</svg>
